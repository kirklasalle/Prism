name: docker-publish

# Publishes the PRISM container image to GitHub Container Registry.
#
# Triggers:
#   - push of a tag matching v*.*.*  → tagged release image (:vX.Y.Z + :vX.Y + :vX + :latest)
#   - push to main                   → :edge image (rolling)
#   - pull_request                   → build-only (no push), gates merges
#   - workflow_dispatch              → manual trigger
#
# Permissions: requires `packages: write` to push to GHCR. The
# repository's GITHUB_TOKEN is sufficient — no PAT required.

on:
    push:
        branches: [ main ]
        tags: [ "v*.*.*" ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:

permissions:
    contents: read
    packages: write
    id-token: write # for cosign keyless signing in a follow-up

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository_owner }}/prism

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Compute image tags + labels
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=edge,enable={{is_default_branch}}
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
                  labels: |
                      org.opencontainers.image.title=PRISM
                      org.opencontainers.image.description=Agents-as-a-Service control plane
                      org.opencontainers.image.licenses=Apache-2.0

            - name: Build and push
              id: build
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # ── Supply-chain: keyless cosign signing via GHA OIDC ──────────
            # Only runs on pushes that actually published an image (no PRs).
            - name: Install cosign
              if: github.event_name != 'pull_request'
              uses: sigstore/cosign-installer@v3
              with:
                  cosign-release: "v2.2.4"

            - name: Sign published image (keyless)
              if: github.event_name != 'pull_request'
              env:
                  COSIGN_EXPERIMENTAL: "1"
                  TAGS: ${{ steps.meta.outputs.tags }}
                  DIGEST: ${{ steps.build.outputs.digest }}
              run: |
                  echo "$TAGS" | while IFS= read -r tag; do
                    [ -z "$tag" ] && continue
                    echo "Signing ${tag}@${DIGEST}"
                    cosign sign --yes "${tag}@${DIGEST}"
                  done
