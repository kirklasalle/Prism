#
# PRISM Release — tag-driven build, test, image, and GitHub Release.
#
# Triggered on push of a `v*.*.*` tag. Builds the project, runs the full
# in-process test runner one last time, packages a tarball of the
# built dist + production deps, and publishes a GitHub Release with
# autogenerated notes plus the tarball as an asset.
#
# Container image publishing is owned by `docker-publish.yml` (separate
# workflow, separate permissions surface). This workflow does NOT push
# to GHCR — keeping the two concerns split lets the release pipeline
# fail-soft on registry outages without blocking the GitHub Release
# itself.
#

name: PRISM Release

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:
        inputs:
            tag:
                description: "Tag to release (must already exist)"
                required: true

permissions:
    contents: write

concurrency:
    group: prism-release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    release:
        name: Build, test, and publish GitHub Release
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout (full history for changelog generation)
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Node 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies (deterministic)
              run: npm ci

            - name: Build
              run: npm run build

            - name: Run full in-process test runner
              run: node dist/tests/index.js

            - name: Resolve tag name
              id: tag
              run: |
                  if [ -n "${{ inputs.tag }}" ]; then
                    echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Package release tarball
              run: |
                  set -euo pipefail
                  TAG="${{ steps.tag.outputs.name }}"
                  STAGE="prism-${TAG}"
                  mkdir -p "dist-release/${STAGE}"
                  # Ship dist/, package.json, package-lock.json, README, LICENSE,
                  # CHANGELOG, .env.example, ecosystem.config.js, Dockerfile.
                  # Leaving src/ out of the tarball so the artefact is the
                  # production-ready bundle.
                  cp -r dist "dist-release/${STAGE}/dist"
                  cp package.json package-lock.json README.md LICENSE CHANGELOG.md \
                     SECURITY.md .env.example ecosystem.config.js Dockerfile \
                     "dist-release/${STAGE}/" 2>/dev/null || true
                  tar -czf "dist-release/${STAGE}.tar.gz" -C "dist-release" "${STAGE}"

            - name: Create GitHub Release with autogenerated notes
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.name }}
                  name: PRISM ${{ steps.tag.outputs.name }}
                  generate_release_notes: true
                  files: |
                      dist-release/prism-${{ steps.tag.outputs.name }}.tar.gz
