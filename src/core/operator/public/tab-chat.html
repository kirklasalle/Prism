<div class="chat panel">
  <div class="chat-header" data-tip-id="chat:header" data-tip-kind="chat">
    <h2 id="active-session-title">Loading...</h2>
    <div id="active-session-meta" class="muted"></div>
    <div id="header-chips" class="header-chips" style="margin-top:12px;"></div>
  </div>
  <section id="messages" class="messages" data-tip-id="chat:messages" data-tip-kind="chat"></section>
  <div class="composer" data-tip-id="chat:composer-area" data-tip-kind="chat">
    <div id="onboarding" class="onboarding"></div>
    <div id="attachment-preview" class="attachment-preview-strip" data-tip-id="chat:attachments" data-tip-kind="chat">
    </div>
    <div class="composer-container">
      <textarea id="composer" placeholder="Ask PRISM anything..." rows="1"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,240)+'px'"
        data-tip-id="chat:composer" data-tip-kind="chat"></textarea>
      <div class="composer-actions">
        <div class="composer-left-actions">
          <button type="button" class="composer-icon-btn" onclick="document.getElementById('file-attach-input').click()"
            title="Attach file" data-tip-id="chat:attach" data-tip-kind="chat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
              </path>
            </svg>
          </button>
          <input type="file" id="file-attach-input" multiple
            accept="image/*,audio/*,video/*,text/*,application/pdf,.md,.json,.csv,.xml,.yaml,.yml,.ts,.js,.py,.html,.css"
            style="display:none" onchange="handleFileSelect(this)" />
          <button type="button" class="composer-icon-btn" onclick="pasteFromClipboard()" title="Paste from clipboard"
            data-tip-id="chat:paste" data-tip-kind="chat">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
        <button id="send-button" class="composer-send-btn" onclick="sendMessage()" title="Send message (Enter)"
          data-tip-id="chat:send" data-tip-kind="chat">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
          </svg>
        </button>
      </div>
    </div>
    <div class="composer-hint"><kbd>Enter</kbd> to send &middot; <kbd>Shift+Enter</kbd> for new line &middot; Drag &amp;
      drop files to attach</div>
  </div>
</div>
