<div class="tab-grid">
  <section class="rail-section panel" data-tip-id="logs:actions" data-tip-kind="logs">
    <h3>Quick Actions</h3>
    <div id="actions" class="stack"></div>
  </section>
  <section class="rail-section panel" data-tip-id="logs:approvals" data-tip-kind="logs">
    <h3>Pending Approvals</h3>
    <div id="pending" class="stack"></div>
  </section>
  <section class="rail-section panel" data-tip-id="logs:action-history" data-tip-kind="logs">
    <h3>Recent Action History</h3>
    <div id="action-history"></div>
  </section>
  <section class="rail-section panel" data-tip-id="logs:chat-telemetry" data-tip-kind="logs">
    <h3>Chat Telemetry</h3>
    <div id="chat-telemetry"></div>
  </section>
  <section class="rail-section panel" data-tip-id="logs:trace-view" data-tip-kind="logs">
    <h3>Correlated Traces</h3>
    <div id="trace-view"></div>
  </section>
  <section class="rail-section panel" data-tip-id="logs:events" data-tip-kind="logs">
    <h3>Recent Events</h3>
    <div id="events"></div>
  </section>
  <section class="rail-section panel" data-tip-id="logs:tool-call-log" data-tip-kind="logs">
    <h3>Tool Call Log</h3>
    <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center;">
      <span class="muted" style="font-size:11px;">Live tool calls from agentic sessions.</span>
      <div style="flex:1;"></div>
      <button class="secondary-button" style="font-size:11px;padding:3px 8px;"
        onclick="state.toolCallLog=[];safeRenderStep('toolCallLog',renderToolCallLog);">Clear</button>
    </div>
    <div id="tool-call-log"></div>
  </section>
  <section class="rail-section panel" data-tip-id="logs:activity-log" data-tip-kind="logs" style="grid-column:1/-1;">
    <h3>📝 Activity Log</h3>
    <div class="log-filter-bar">
      <label class="muted" style="font-size:11px;">Source:</label>
      <select id="logs-tab-filter" data-tip-id="logs:filter-source" data-tip-kind="logs" onchange="filterLogs()">
        <option value="">All</option>
        <option value="diagnostics">diagnostics</option>
        <option value="agent-diagnostics">agent-diagnostics</option>
        <option value="computer-diagnostics">computer-diagnostics</option>
        <option value="tools">tools</option>
        <option value="browser">browser</option>
        <option value="chat">chat</option>
        <option value="agentic">agentic</option>
        <option value="computer">computer</option>
        <option value="settings">settings</option>
        <option value="workspace">workspace</option>
        <option value="scheduler">scheduler</option>
        <option value="hardware">hardware</option>
      </select>
      <label class="muted" style="font-size:11px;">Severity:</label>
      <select id="logs-severity-filter" data-tip-id="logs:filter-severity" data-tip-kind="logs" onchange="filterLogs()">
        <option value="">All</option>
        <option value="info">info</option>
        <option value="warn">warn</option>
        <option value="error">error</option>
      </select>
      <div style="flex:1;"></div>
      <span class="muted" style="font-size:10px;">Last 500 entries · auto-scroll</span>
      <button class="secondary-button" style="font-size:11px;padding:3px 8px;" onclick="clearLogs()">Clear</button>
    </div>
    <div id="logs-panel-body"
      style="max-height:420px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;background:rgba(0,0,0,0.15);padding:4px 0;">
    </div>
  </section>
</div>

<!--
  ============================================================================
  MCP Servers panel — APPEND-ONLY addition (frontend protection guarantee).
  Polls /api/mcp/servers every 5s and lets the operator force a reconnect.
  ============================================================================
-->
<section class="rail-section panel" style="margin-top:16px;" data-tip-id="logs:mcp" data-tip-kind="logs">
  <header style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
    <h3 style="margin:0;">MCP Servers</h3>
    <span id="mcp-servers-summary" class="muted" style="font-size:12px;">—</span>
    <div style="flex:1;"></div>
    <button class="secondary-button" style="font-size:11px;padding:3px 8px;" onclick="window.refreshMcpServers && window.refreshMcpServers()">Refresh</button>
  </header>
  <div id="mcp-servers-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;">
    <div class="muted" style="font-size:12px;">Loading…</div>
  </div>
</section>

<!--
  ============================================================================
  Live Console panel — APPEND-ONLY addition.
  Hydrates from GET /api/debug/console?limit=500, then subscribes to
  WebSocket {type:"console"} messages for tail-follow streaming.
  ============================================================================
-->
<section class="rail-section panel" style="margin-top:16px;" data-tip-id="logs:console" data-tip-kind="logs">
  <header style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
    <h3 style="margin:0;">Live Console</h3>
    <span id="live-console-status" class="muted" style="font-size:12px;">Connecting…</span>
    <div style="flex:1;"></div>
    <label class="muted" style="font-size:11px;display:flex;align-items:center;gap:4px;">
      Source:
      <select id="live-console-source" style="font-size:11px;padding:3px 6px;background:var(--surface-2,#222);color:var(--text,#eee);border:1px solid var(--border);border-radius:4px;">
        <option value="all">all</option>
        <option value="stdout">stdout</option>
        <option value="stderr">stderr</option>
        <option value="mcp">MCP only</option>
      </select>
    </label>
    <label class="muted" style="font-size:11px;display:flex;align-items:center;gap:4px;">
      <input type="checkbox" id="live-console-autoscroll" checked> auto-scroll
    </label>
    <button class="secondary-button" id="live-console-pause" style="font-size:11px;padding:3px 8px;" onclick="window.toggleLiveConsolePause && window.toggleLiveConsolePause()">Pause</button>
    <button class="secondary-button" style="font-size:11px;padding:3px 8px;" onclick="window.clearLiveConsole && window.clearLiveConsole()">Clear</button>
  </header>
  <div id="live-console-body"
    style="max-height:420px;min-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;background:rgba(0,0,0,0.45);padding:6px 8px;font-family:ui-monospace,'Cascadia Mono',Consolas,monospace;font-size:11.5px;line-height:1.4;">
    <div class="muted" style="font-size:12px;">Loading…</div>
  </div>
</section>

<script>
(function () {
  // ── MCP Servers panel ─────────────────────────────────────────────────────
  const grid = document.getElementById('mcp-servers-grid');
  const summary = document.getElementById('mcp-servers-summary');
  const STATE_COLORS = {
    connected: '#3ec46d',
    retrying: '#f0b73f',
    down: '#ff7a55',
    failed: '#ff4d4d',
  };
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function renderServers(payload) {
    if (!payload || !payload.attached) {
      grid.innerHTML = '<div class="muted" style="font-size:12px;">MCP adapter not attached.</div>';
      summary.textContent = 'detached';
      return;
    }
    const servers = payload.servers || [];
    if (servers.length === 0) {
      grid.innerHTML = '<div class="muted" style="font-size:12px;">No MCP servers configured.</div>';
      summary.textContent = '0 servers';
      return;
    }
    const counts = { connected: 0, retrying: 0, down: 0, failed: 0 };
    grid.innerHTML = servers.map(s => {
      counts[s.state] = (counts[s.state] || 0) + 1;
      const color = STATE_COLORS[s.state] || '#888';
      const tail = (s.stderrTail || []).slice(-5);
      const tailHtml = tail.length
        ? '<details style="margin-top:6px;"><summary class="muted" style="font-size:11px;cursor:pointer;">stderr tail</summary>'
          + '<pre style="margin:4px 0 0 0;font-size:10.5px;white-space:pre-wrap;color:#ccc;background:rgba(0,0,0,0.3);padding:4px 6px;border-radius:4px;">'
          + escapeHtml(tail.join('\n')) + '</pre></details>'
        : '';
      const lastErr = s.lastError ? ('<div class="muted" style="font-size:11px;color:#ff9a85;margin-top:4px;">' + escapeHtml(s.lastError) + '</div>') : '';
      const nextRetry = s.nextRetryAt ? ('<div class="muted" style="font-size:11px;">next retry: ' + escapeHtml(new Date(s.nextRetryAt).toLocaleTimeString()) + '</div>') : '';
      return ''
        + '<div style="border:1px solid var(--border);border-radius:8px;padding:8px 10px;background:rgba(0,0,0,0.2);">'
        +   '<div style="display:flex;align-items:center;gap:6px;">'
        +     '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + color + ';"></span>'
        +     '<strong style="font-size:13px;">' + escapeHtml(s.name) + '</strong>'
        +     '<span class="muted" style="font-size:11px;margin-left:auto;">' + escapeHtml(s.state) + '</span>'
        +   '</div>'
        +   '<div class="muted" style="font-size:11px;margin-top:4px;">'
        +     escapeHtml(String(s.toolCount || 0)) + ' tool(s)'
        +     (s.retryCount > 0 ? (' · retries: ' + escapeHtml(String(s.retryCount))) : '')
        +   '</div>'
        +   nextRetry
        +   lastErr
        +   tailHtml
        +   '<div style="margin-top:6px;">'
        +     '<button class="secondary-button" style="font-size:11px;padding:2px 8px;" '
        +       'onclick="window.reconnectMcpServer && window.reconnectMcpServer(' + JSON.stringify(s.name) + ')">Reconnect</button>'
        +   '</div>'
        + '</div>';
    }).join('');
    summary.textContent = servers.length + ' server(s) · '
      + counts.connected + ' up · ' + (counts.retrying || 0) + ' retrying · '
      + ((counts.down || 0) + (counts.failed || 0)) + ' down';
  }
  async function refreshMcpServers() {
    try {
      const r = await fetch('/api/mcp/servers', { credentials: 'same-origin' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const payload = await r.json();
      renderServers(payload);
    } catch (err) {
      grid.innerHTML = '<div class="muted" style="font-size:12px;color:#ff9a85;">Error: ' + escapeHtml(String(err)) + '</div>';
    }
  }
  window.refreshMcpServers = refreshMcpServers;
  window.reconnectMcpServer = async function (name) {
    try {
      const r = await fetch('/api/mcp/servers/' + encodeURIComponent(name) + '/reconnect',
        { method: 'POST', credentials: 'same-origin' });
      const data = await r.json().catch(() => ({}));
      if (!r.ok || !data.ok) {
        alert('Reconnect failed: ' + (data.error || ('HTTP ' + r.status)));
      }
    } catch (err) {
      alert('Reconnect error: ' + String(err));
    } finally {
      refreshMcpServers();
    }
  };
  refreshMcpServers();
  setInterval(refreshMcpServers, 5000);

  // ── Live Console panel ────────────────────────────────────────────────────
  const consoleBody = document.getElementById('live-console-body');
  const consoleStatus = document.getElementById('live-console-status');
  const sourceFilter = document.getElementById('live-console-source');
  const autoScrollEl = document.getElementById('live-console-autoscroll');
  const pauseBtn = document.getElementById('live-console-pause');
  const CLIENT_CAP = 5000;
  const buffer = []; // {ts, stream, line}
  let paused = false;
  function shouldShow(entry) {
    const v = sourceFilter.value;
    if (v === 'all') return true;
    if (v === 'stdout') return entry.stream === 'stdout';
    if (v === 'stderr') return entry.stream === 'stderr';
    if (v === 'mcp') return /^\[MCP[:\]]/.test(entry.line);
    return true;
  }
  function severityClass(line) {
    if (/\b(FATAL|ERROR)\b/.test(line)) return 'color:#ff7a7a;';
    if (/\b(WARN|WARNING)\b/.test(line)) return 'color:#f0c46d;';
    return '';
  }
  function renderAll() {
    if (paused) return;
    const visible = buffer.filter(shouldShow);
    if (visible.length === 0) {
      consoleBody.innerHTML = '<div class="muted" style="font-size:12px;">(no lines)</div>';
      return;
    }
    consoleBody.innerHTML = visible.map(e => {
      const t = (e.ts || '').slice(11, 23);
      const tag = e.stream === 'stderr' ? '<span style="color:#ff9a85;">err</span>' : '<span style="color:#7ad0ff;">out</span>';
      return '<div style="' + severityClass(e.line) + '">'
        + '<span class="muted" style="font-size:10.5px;">' + escapeHtml(t) + '</span> '
        + tag + ' ' + escapeHtml(e.line)
        + '</div>';
    }).join('');
    if (autoScrollEl.checked) {
      consoleBody.scrollTop = consoleBody.scrollHeight;
    }
  }
  function pushEntry(entry) {
    buffer.push(entry);
    if (buffer.length > CLIENT_CAP) buffer.splice(0, buffer.length - CLIENT_CAP);
    renderAll();
  }
  sourceFilter.addEventListener('change', renderAll);
  window.toggleLiveConsolePause = function () {
    paused = !paused;
    pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    if (!paused) renderAll();
  };
  window.clearLiveConsole = function () {
    buffer.length = 0;
    renderAll();
  };
  // Hydrate from REST
  (async () => {
    try {
      const r = await fetch('/api/debug/console?limit=500', { credentials: 'same-origin' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      if (!data.attached) {
        consoleStatus.textContent = 'console interceptor not attached';
        consoleBody.innerHTML = '<div class="muted" style="font-size:12px;">Console interceptor not attached.</div>';
        return;
      }
      for (const line of (data.lines || [])) buffer.push(line);
      consoleStatus.textContent = 'live';
      renderAll();
    } catch (err) {
      consoleStatus.textContent = 'error';
      consoleBody.innerHTML = '<div class="muted" style="font-size:12px;color:#ff9a85;">Error: ' + escapeHtml(String(err)) + '</div>';
    }
  })();
  // Subscribe to existing dashboard WebSocket if present.
  function attachWs(ws) {
    if (!ws || ws.readyState > 1) return false;
    ws.addEventListener('message', (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg && msg.type === 'console' && typeof msg.line === 'string') {
          pushEntry({ ts: msg.ts, stream: msg.stream, line: msg.line });
        }
      } catch { /* ignore non-JSON */ }
    });
    return true;
  }
  // Hook into the page's primary WS once it's available. The dashboard
  // already creates `window.dashboardWs` or similar; fall back to opening
  // our own only if that hook is missing after a short wait.
  (function waitForWs() {
    let attempts = 0;
    const tryAttach = () => {
      attempts++;
      const candidate = window.dashboardWs || window.__prismWs || window.ws;
      if (attachWs(candidate)) return;
      if (attempts > 20) {
        // Open a dedicated socket as a last resort.
        try {
          const proto = location.protocol === 'https:' ? 'wss' : 'ws';
          const own = new WebSocket(proto + '://' + location.host);
          attachWs(own);
        } catch { /* ignore */ }
        return;
      }
      setTimeout(tryAttach, 250);
    };
    tryAttach();
  })();
})();
</script>
